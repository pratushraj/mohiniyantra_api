<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Dhankeshri Play - Bulk Coupons B</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js?v=3"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            document.title = `${appGlobalConfig.appName} - Bulk Coupons B`;
            const userSpan = document.querySelector('.top-info span:first-child');
            const balanceSpan = document.querySelector('.top-info span:last-child');
            if (userSpan) userSpan.textContent = `Welcome : ${appGlobalConfig.unique_id}`;
            if (balanceSpan) balanceSpan.textContent = `Balance Point : ${appGlobalConfig.balance}`;
        });
    </script>

    <style>
        @media screen and (min-width: 901px) {
            .input-cell {
                padding: 2px !important;
                font-size: 24px !important;
                font-weight: 600 !important;
            }
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <div class="version-info">0.0.12</div>
        <div class="top-info">
            <span id="welcome-id">Welcome : 2101400016</span>
            <span id="balance-pts">Balance Point : 97885.30</span>
        </div>
        <div class="top-right-info">
            <button class="lobby-btn" onclick="location.href='index.html'">LOBBY [Q]</button>
        </div>
    </div>

    <div class="container fade-in">
        <div class="tabs-row">
            <div class="menu-tabs">
                <button class="tab tab-bulk-a" onclick="location.href='bulk-coupons.html'">Bulk Coupons [ A ]</button>
                <button class="tab tab-bulk-b active" onclick="location.href='bulk-coupons-b.html'">Bulk Coupons [ B
                    ]</button>
                <button class="tab tab-pointwise">Pointwise Coupons</button>
                <button class="tab tab-loose" onclick="location.href='loose-coupons.html'">Loose Coupons</button>
                <button class="tab tab-loose-pointwise">Loose Pointwise Coupons</button>
            </div>
            <div class="tabs-right">
                <span id="current-date">Date : 18:02:2026</span>
                <span id="event-code">Gift Event Code : 11:00</span>
                <span id="countdown-timer">Countdown : 00:04:16</span>
            </div>
        </div>

        <div style="display: none;">
            <input type="hidden" id="pointRate" value="1.10">
        </div>

        <div class="data-table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width: 200px;">Product Group</th>
                        <th style="width: 100px;">Gift Coin</th>
                        <th style="width: 75px;">00-90</th>
                        <th style="width: 75px;">01-91</th>
                        <th style="width: 75px;">02-92</th>
                        <th style="width: 75px;">03-93</th>
                        <th style="width: 75px;">04-94</th>
                        <th style="width: 75px;">05-95</th>
                        <th style="width: 75px;">06-96</th>
                        <th style="width: 75px;">07-97</th>
                        <th style="width: 75px;">08-98</th>
                        <th style="width: 75px;">09-99</th>
                        <th style="width: 75px;">All</th>
                        <th style="width: 80px;">Qty</th>
                        <th style="width: 80px;">Pts</th>
                        <th id="draw-time-header" style="width: 100px;">--:--</th>
                    </tr>
                </thead>
                <tbody id="couponBody">
                    <!-- Dynamic rows will be here -->
                </tbody>
                <tfoot>
                    <tr style="background-color: var(--header-bg); font-weight: bold;">
                        <td>All</td>
                        <td>-</td>
                        <td><input type="text" class="input-cell global-range-input" data-col="0" inputmode="none">
                        </td>
                        <td><input type="text" class="input-cell global-range-input" data-col="1" inputmode="none">
                        </td>
                        <td><input type="text" class="input-cell global-range-input" data-col="2" inputmode="none">
                        </td>
                        <td><input type="text" class="input-cell global-range-input" data-col="3" inputmode="none">
                        </td>
                        <td><input type="text" class="input-cell global-range-input" data-col="4" inputmode="none">
                        </td>
                        <td><input type="text" class="input-cell global-range-input" data-col="5" inputmode="none">
                        </td>
                        <td><input type="text" class="input-cell global-range-input" data-col="6" inputmode="none">
                        </td>
                        <td><input type="text" class="input-cell global-range-input" data-col="7" inputmode="none">
                        </td>
                        <td><input type="text" class="input-cell global-range-input" data-col="8" inputmode="none">
                        </td>
                        <td><input type="text" class="input-cell global-range-input" data-col="9" inputmode="none">
                        </td>
                        <td style="text-align: right;">TOTAL</td>
                        <td id="totalQty">0</td>
                        <td id="totalPts">0.00</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="bottom-actions">
            <button class="action-btn btn-green" onclick="location.href='upcoming.html'">
                UPCOMMING <span class="shortcut">[F1]</span>
                <span id="upcomingBadge" class="upcoming-badge" style="display: none;">0</span>
            </button>
            <button class="action-btn btn-green" id="buyBtn">SUBMIT <span class="shortcut">[F2]</span></button>
            <button class="action-btn btn-red" onclick="clearAll()">CLEAR <span class="shortcut">[F3]</span></button>
            <button class="action-btn btn-red" id="cancelBtn">CANCEL <span class="shortcut">[F4]</span></button>
            <button class="action-btn btn-red" onclick="location.href='result.html'">MOHINI <span
                    class="shortcut">[F5]</span></button>
            <button class="action-btn btn-red" onclick="location.href='report.html'">C. DETAILS <span
                    class="shortcut">[F6]</span></button>
            <button class="action-btn btn-red" onclick="location.href='summary.html'">P. SUM <span
                    class="shortcut">[F7]</span></button>
        </div>
    </div>

    <script>
        const appConfig = {
            drawTime: '09:15',
            groups: SHARED_GROUPS
        };

        const couponBody = document.getElementById('couponBody');
        const drawTimeHeader = document.getElementById('draw-time-header');

        function initUI() {
            drawTimeHeader.textContent = appConfig.drawTime;
            couponBody.innerHTML = '';

            appConfig.groups.forEach(group => {
                const tr = document.createElement('tr');
                tr.className = 'coupon-row';
                tr.setAttribute('data-game-code', group.code);
                tr.setAttribute('data-game-type-id', group.id);

                let html = `<td>${group.name} ${group.code}</td><td>-</td>`;
                for (let i = 0; i < 10; i++) {
                    html += `<td><input type="text" class="input-cell range-input" inputmode="none" data-num="${i}"></td>`;
                }
                html += `
                    <td><input type="text" class="input-cell all-input" style="width: 50px;" inputmode="none"></td>
                    <td class="qty-cell">0</td>
                    <td class="pts-cell">0.00</td>
                    <td class="result-cell" style="font-weight: bold; font-size: 14px;">-</td>
                `;
                tr.innerHTML = html;
                couponBody.appendChild(tr);
            });

            if (typeof updateDynamicUI === 'function') updateDynamicUI();
        }

        // Real-time UI Updates
        window.updateDynamicUI = function () {
            if (!window.appGameDetails) return;
            const results = window.appGameDetails.prev_game_results || [];
            if (results.length > 0 && results[0].time) {
                drawTimeHeader.textContent = results[0].time;
            }
            const resultCells = document.querySelectorAll('.result-cell');
            resultCells.forEach((cell, index) => {
                if (results[index] && results[index].win_code) {
                    cell.textContent = results[index].win_code;
                } else {
                    cell.textContent = '-';
                }
            });
        }

        initUI();



        const pointRateInput = document.getElementById('pointRate');
        const totalQtyEl = document.getElementById('totalQty');
        const totalPtsEl = document.getElementById('totalPts');

        async function handleBuy() {
            if (!window.appGameDetails || !window.appGameDetails.timeSlotId) {
                showPopup("Game details not loaded yet.", "Error");
                await updateLiveHeader();
                if (!window.appGameDetails.timeSlotId) return;
            }
            const tickets = [];
            document.querySelectorAll('.coupon-row').forEach(row => {
                const gameTypeId = row.getAttribute('data-game-type-id');
                row.querySelectorAll('.range-input').forEach(input => {
                    const qty = parseInt(input.value) || 0;
                    if (qty > 0) {
                        tickets.push({
                            game_id: 2, // Bulk B
                            game_type_id: gameTypeId,
                            number: input.getAttribute('data-num'),
                            time_slot_id: [window.appGameDetails.timeSlotId],
                            ticket_date: window.appGameDetails.date,
                            qty: qty.toString()
                        });
                    }
                });
            });
            if (tickets.length === 0) { showPopup("Please enter the Bet", "Warning"); return; }
            const totalAmt = document.getElementById('totalPts').textContent;
            const result = await postData(CONFIG.TICKET_PURCHASE_URL, { userId: appGlobalConfig.userId, tickets }, `Buy Successful with Amt ${totalAmt}`);
            if (result) { clearAll(); if (typeof updateLiveBalance === 'function') updateLiveBalance(); }
        }

        async function handleCancel() {
            const request = {
                userId: appGlobalConfig.userId,
                gameId: 2 // Side B
            };
            const result = await postData(CONFIG.CANCEL_TICKETS_URL, request, "Ticket Cancelled Successfully");
            if (result && typeof updateLiveBalance === 'function') updateLiveBalance();
        }

        document.getElementById('buyBtn').addEventListener('click', handleBuy);
        document.getElementById('cancelBtn').addEventListener('click', handleCancel);

        // Measurer for smooth font resizing
        const fontMeasurer = document.createElement('span');
        fontMeasurer.style.visibility = 'hidden';
        fontMeasurer.style.position = 'absolute';
        fontMeasurer.style.whiteSpace = 'pre';
        document.body.appendChild(fontMeasurer);

        function calculate() {
            let gQty = 0, gPts = 0;
            const rate = parseFloat(pointRateInput ? pointRateInput.value : 1.0) || 1.0;

            function adjustFontSize(el, maxW, baseSize) {
                const computedStyle = window.getComputedStyle(el);
                let size = baseSize || parseInt(computedStyle.fontSize) || 19;
                fontMeasurer.style.font = computedStyle.font;
                fontMeasurer.style.fontSize = size + 'px';
                fontMeasurer.textContent = el.textContent || el.value || '0';

                while (fontMeasurer.offsetWidth > maxW && size > 8) {
                    size--;
                    fontMeasurer.style.fontSize = size + 'px';
                }
                const newSize = size + 'px';
                if (el.style.fontSize !== newSize) {
                    el.style.fontSize = newSize;
                }
            }

            document.querySelectorAll('.coupon-row').forEach(row => {
                let rQty = 0;
                row.querySelectorAll('.range-input').forEach(i => rQty += parseInt(i.value) || 0);
                const rPts = rQty * rate * 10;
                const qtyCell = row.querySelector('.qty-cell');
                const ptsCell = row.querySelector('.pts-cell');

                qtyCell.textContent = rQty;
                ptsCell.textContent = rPts.toFixed(2);

                adjustFontSize(qtyCell, qtyCell.clientWidth - 4);
                adjustFontSize(ptsCell, ptsCell.clientWidth - 4);

                gQty += rQty; gPts += rPts;
            });
            totalQtyEl.textContent = gQty;
            totalPtsEl.textContent = gPts.toFixed(2);
            adjustFontSize(totalQtyEl, totalQtyEl.clientWidth - 4);
            adjustFontSize(totalPtsEl, totalPtsEl.clientWidth - 4);
        }

        document.addEventListener('input', (e) => {
            if (e.target && e.target.classList && (e.target.classList.contains('input-cell') || e.target.id === 'pointRate')) {
                if (e.target.classList.contains('input-cell')) {
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');

                    // Restriction: Max 999
                    if (parseInt(e.target.value) > 999) {
                        e.target.value = '999';
                    }

                    // Smooth shrink active input
                    const input = e.target;
                    let size = 24;
                    fontMeasurer.style.font = window.getComputedStyle(input).font;
                    fontMeasurer.style.fontSize = size + 'px';
                    fontMeasurer.textContent = input.value || '0';
                    const maxW = input.clientWidth - 4;
                    while (fontMeasurer.offsetWidth > maxW && size > 8) {
                        size--;
                        fontMeasurer.style.fontSize = size + 'px';
                    }
                    const newSize = size + 'px';
                    if (input.style.fontSize !== newSize) {
                        input.style.fontSize = newSize;
                    }
                }

                if (e.target.classList.contains('global-range-input') || e.target.classList.contains('all-input')) {
                    const cur = parseInt(e.target.value) || 0;
                    const prev = parseInt(e.target.getAttribute('data-prev-val')) || 0;
                    const delta = cur - prev;
                    if (e.target.classList.contains('global-range-input')) {
                        const col = e.target.dataset.col;
                        document.querySelectorAll('.coupon-row').forEach(row => {
                            const inp = row.querySelectorAll('.range-input')[col];
                            let nv = (parseInt(inp.value) || 0) + delta;
                            if (nv > 999) nv = 999;
                            inp.value = nv > 0 ? nv : '';
                        });
                    } else {
                        e.target.closest('tr').querySelectorAll('.range-input').forEach(inp => {
                            let nv = (parseInt(inp.value) || 0) + delta;
                            if (nv > 999) nv = 999;
                            inp.value = nv > 0 ? nv : '';
                        });
                    }
                    e.target.setAttribute('data-prev-val', cur);
                }
                calculate();
            }
        });

        document.addEventListener('focus', (e) => {
            if (e.target && e.target.classList && (e.target.classList.contains('global-range-input') || e.target.classList.contains('all-input'))) {
                e.target.setAttribute('data-prev-val', e.target.value || '0');
            }
        }, true);

        document.addEventListener('blur', (e) => {
            // No longer clearing value on blur to allow persistence
        }, true);

        function clearAll() { document.querySelectorAll('.input-cell').forEach(i => i.value = ''); calculate(); }

        document.addEventListener('keydown', (e) => {
            const inputs = Array.from(document.querySelectorAll('.input-cell'));
            const idx = inputs.indexOf(e.target);
            if (idx !== -1) {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    let target = null;
                    if (e.key === 'ArrowLeft') target = inputs[idx - 1];
                    else if (e.key === 'ArrowRight') target = inputs[idx + 1];
                    else {
                        const rect = e.target.getBoundingClientRect();
                        const cx = rect.left + rect.width / 2;
                        let minD = Infinity;
                        inputs.forEach(inp => {
                            if (inp === e.target) return;
                            const r = inp.getBoundingClientRect();
                            const icx = r.left + r.width / 2, icy = r.top + r.height / 2;
                            if (e.key === 'ArrowUp' && icy < rect.top) {
                                const d = rect.top - icy;
                                if (Math.abs(icx - cx) < rect.width / 2 && d < minD) { minD = d; target = inp; }
                            } else if (e.key === 'ArrowDown' && icy > rect.bottom) {
                                const d = icy - rect.bottom;
                                if (Math.abs(icx - cx) < rect.width / 2 && d < minD) { minD = d; target = inp; }
                            }
                        });
                    }
                    if (target) target.focus();
                }
            }
            if (e.key === 'F1') { e.preventDefault(); location.href = 'upcoming.html'; }
            else if (e.key === 'F3') { e.preventDefault(); clearAll(); }
            else if (e.key === 'F2') { e.preventDefault(); handleBuy(); }
            else if (e.key === 'F4') { e.preventDefault(); handleCancel(); }
            else if (e.key === 'F5') { e.preventDefault(); location.href = 'result.html'; }
            else if (e.key === 'F7') { e.preventDefault(); location.href = 'summary.html'; }
            else if (e.key.toLowerCase() === 'q' && e.target.tagName !== 'INPUT') location.href = 'index.html';
        });

        // Custom Cursor & Keypad Logic
        let customCursor = null;
        let currentActiveInput = null;

        function createCustomCursor() {
            if (!customCursor) {
                customCursor = document.createElement('div');
                customCursor.className = 'custom-cursor';
                customCursor.style.zIndex = '1000';
                document.body.appendChild(customCursor);
            }
            customCursor.style.display = 'block';
        }

        function updateCursorPosition(input) {
            if (!input || !customCursor) return;
            const rect = input.getBoundingClientRect();
            const inputStyle = window.getComputedStyle(input);
            fontMeasurer.style.font = inputStyle.font;
            fontMeasurer.style.fontSize = inputStyle.fontSize;
            fontMeasurer.style.fontWeight = inputStyle.fontWeight;

            const fullText = input.value || "";
            const textBeforeCursor = fullText.substring(0, input.selectionStart);

            fontMeasurer.textContent = textBeforeCursor;
            const textWidthBefore = fontMeasurer.offsetWidth;

            fontMeasurer.textContent = fullText || " ";
            const totalTextWidth = fontMeasurer.offsetWidth;

            let startX = rect.left + window.scrollX;
            const textAlign = inputStyle.textAlign;

            if (textAlign === 'center') {
                startX += (rect.width - totalTextWidth) / 2;
            } else {
                startX += (parseInt(inputStyle.paddingLeft) || 0);
            }

            customCursor.style.left = (startX + textWidthBefore - 1) + 'px';

            const cursorHeight = parseFloat(window.getComputedStyle(customCursor).height) || 19;
            customCursor.style.top = (rect.top + window.scrollY + (rect.height - cursorHeight) / 2) + 'px';
            customCursor.style.display = 'block';
        }

        document.addEventListener('focusin', (e) => {
            if (e.target.classList && e.target.classList.contains('input-cell')) {
                currentActiveInput = e.target;
                const keypad = document.getElementById('customKeypad');
                if (keypad) keypad.style.display = 'flex';
                createCustomCursor();
                updateCursorPosition(e.target);
                // Ensure inputmode is 'none' when focused, unless toggled
                if (currentActiveInput.getAttribute('inputmode') !== 'numeric') {
                    currentActiveInput.setAttribute('inputmode', 'none');
                }
            }
        });

        document.addEventListener('click', (e) => {
            if (e.target.classList && e.target.classList.contains('input-cell')) {
                const keypad = document.getElementById('customKeypad');
                if (keypad) keypad.style.display = 'flex';
            }
        });

        document.addEventListener('blur', (e) => {
            if (e.target.classList && e.target.classList.contains('input-cell') && customCursor) {
                setTimeout(() => {
                    if (document.activeElement !== e.target &&
                        !document.activeElement.classList.contains('input-cell') &&
                        !document.activeElement.classList.contains('keypad-btn')) {
                        customCursor.style.display = 'none';
                        currentActiveInput = null;
                    }
                }, 100);
            }
        }, true);

        ['input', 'click', 'keydown', 'keyup'].forEach(ev => {
            document.addEventListener(ev, (e) => {
                if (e.target.classList && e.target.classList.contains('input-cell')) {
                    requestAnimationFrame(() => updateCursorPosition(e.target));
                }
            }, true);
        });

        document.addEventListener('selectionchange', () => {
            if (currentActiveInput && customCursor) requestAnimationFrame(() => updateCursorPosition(currentActiveInput));
        });

        window.handleKeypad = function (key) {
            if (!currentActiveInput) return;
            const input = currentActiveInput;
            const start = input.selectionStart;
            const end = input.selectionEnd;
            let val = input.value;

            if (key === 'delete') {
                if (start === end && start > 0) {
                    input.value = val.slice(0, start - 1) + val.slice(start);
                    input.setSelectionRange(start - 1, start - 1);
                } else {
                    input.value = val.slice(0, start) + val.slice(end);
                    input.setSelectionRange(start, start);
                }
            } else if (key === 'toggle') {
                const currentMode = input.getAttribute('inputmode');
                input.setAttribute('inputmode', currentMode === 'none' ? 'numeric' : 'none');
                input.blur();
                setTimeout(() => input.focus(), 10);
            } else if (key === 'hide') {
                const keypad = document.getElementById('customKeypad');
                if (keypad) keypad.style.display = 'none';
            } else {
                if (val.length < 3 || (end - start) > 0) {
                    input.value = val.slice(0, start) + key + val.slice(end);
                    input.setSelectionRange(start + 1, start + 1);
                }
            }
            input.dispatchEvent(new Event('input', { bubbles: true }));
        };

        calculate();
    </script>

    <!-- Custom Keypad UI -->
    <div class="custom-keypad" id="customKeypad">
        <button class="keypad-btn" onpointerdown="event.preventDefault(); handleKeypad('1')">1</button>
        <button class="keypad-btn" onpointerdown="event.preventDefault(); handleKeypad('2')">2</button>
        <button class="keypad-btn" onpointerdown="event.preventDefault(); handleKeypad('3')">3</button>
        <button class="keypad-btn" onpointerdown="event.preventDefault(); handleKeypad('4')">4</button>
        <button class="keypad-btn" onpointerdown="event.preventDefault(); handleKeypad('5')">5</button>
        <button class="keypad-btn" onpointerdown="event.preventDefault(); handleKeypad('6')">6</button>
        <button class="keypad-btn" onpointerdown="event.preventDefault(); handleKeypad('7')">7</button>
        <button class="keypad-btn" onpointerdown="event.preventDefault(); handleKeypad('8')">8</button>
        <button class="keypad-btn" onpointerdown="event.preventDefault(); handleKeypad('9')">9</button>
        <button class="keypad-btn" onpointerdown="event.preventDefault(); handleKeypad('0')">0</button>
        <button class="keypad-btn delete-btn" onpointerdown="event.preventDefault(); handleKeypad('delete')">
            <svg fill="currentColor" width="20" height="20" viewBox="0 0 24 24">
                <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
            </svg>
        </button>
        <button class="keypad-btn hide-btn" onpointerdown="event.preventDefault(); handleKeypad('hide')"
            style="display: flex; flex-direction: column; gap: 2px; padding: 4px 0;">
            <svg fill="currentColor" width="18" height="18" viewBox="0 0 24 24">
                <path
                    d="M20 5H4c-1.1 0-1.99.9-1.99 2L2 17c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-9 3h2v2h-2V8zm0 3h2v2h-2v-2zM8 8h2v2H8V8zm0 3h2v2H8v-2zm-1 2H5v-2h2v2zm0-3H5V8h2v2zm9 7H8v-2h8v2zm0-4h-2v-2h2v2zm0-3h-2V8h2v2zm3 3h-2v-2h2v2zm0-3h-2V8h2v2z" />
            </svg>
            <svg fill="currentColor" width="12" height="12" viewBox="0 0 24 24">
                <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
            </svg>
        </button>
    </div>
</body>

</html>

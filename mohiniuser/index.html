<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Dhankeshri Play - Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            document.title = `${appGlobalConfig.appName} - Home`;
            const infoDiv = document.querySelector('.top-bar');
            if (infoDiv) {
                infoDiv.innerHTML = `
                    <div class="top-info">
                        <span>Welcome : ${appGlobalConfig.unique_id}</span>
                        <br>
                        <span>Balance Point : ${appGlobalConfig.balance}</span>
                    </div>
                `;
            }
        });
    </script>
    <style>
        .top-info {
            text-align: center;
            color: #000166;
            font-size: 18px;
            padding-top: 10px;
        }

        .btn-change-pw {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5vw;
            padding: 15px;
        }

        .btn-logout {
            position: fixed;
            bottom: 50px;
            right: 50px;
            padding: 15px 40px;
            font-size: 30px;
        }

        @media screen and (max-width: 600px) {
            .nav-main-btn {
                font-size: 28px !important;
                padding: 12px 30px !important;
                margin-bottom: 5rem !important;
            }

            .top-info {
                font-size: 14px;
            }

            .btn-change-pw {
                bottom: 20px !important;
                left: 10px !important;
                transform: none !important;
                font-size: 14px !important;
                padding: 10px 15px !important;
            }

            .btn-logout {
                bottom: 20px !important;
                right: 10px !important;
                font-size: 14px !important;
                padding: 10px 15px !important;
            }
        }

        /* Landscape Mobile Fix */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .nav-main-btn {
                font-size: 40px !important;
                padding: 8px 30px !important;
                margin-bottom: 2rem !important;
                /* Prevent pushing out of screen */
            }

            .top-info {
                font-size: 14px;
                padding-top: 5px;
            }

            .btn-change-pw {
                bottom: 10px !important;
                left: 38% !important;
                transform: none !important;
                font-size: 19px !important;
                padding: 8px 15px !important;
            }

            .action-btn {
                height: auto !important;
            }

            .btn-logout {
                bottom: 10px !important;
                right: 20px !important;
                font-size: 20px !important;
                padding: 8px 15px !important;
            }
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <span>0.0.12</span>
    </div>

    <div class="home-screen fade-in">
        <button class="nav-main-btn" onclick="location.href='bulk-coupons.html'">Mohini</button>


        <button class="action-btn btn-red btn-change-pw" onclick="location.href='change-password.html'">Change
            Password</button>

        <button class="action-btn btn-red btn-logout" onclick="logout()">Logout</button>
    </div>

    <script>
        // Placeholder for any shared logic
    </script>
</body>

</html>
